<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Routine Tracker</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div id="app">
        <!-- ホーム画面 -->
        <div id="home-screen">
            <h1>Select Routine</h1>
            <div id="routine-list">
                <!-- ここにルーティンリストが生成される -->
            </div>

            <button id="create-routine-btn" style="margin-top: 30px; background-color: #333;">+ Create New
                Routine</button>

            <!-- ルーティン作成モーダル -->
            <div id="create-modal" class="modal hidden">
                <div class="modal-content">
                    <h2 id="modal-title">Create Routine</h2>
                    <input type="hidden" id="edit-routine-id">
                    <input type="text" id="new-routine-name" placeholder="Routine Name"
                        style="width: 100%; margin-bottom: 20px; padding: 10px;">

                    <div id="new-task-list" style="margin-bottom: 15px;">
                        <!-- タスク入力欄がここに追加される -->
                    </div>

                    <button id="add-task-btn" onclick="addTaskInput()"
                        style="background: #444; margin-bottom: 20px; font-size: 14px;">+ Add Task</button>

                    <div style="display: flex; gap: 10px;">
                        <button onclick="closeModal()" type="button" style="background: #555;">Cancel</button>
                        <button onclick="saveNewRoutine()" type="button" style="background: #2563eb;">Save</button>
                    </div>
                </div>
            </div>

            <!-- 汎用確認・アラートモーダル -->
            <div id="confirm-modal" class="modal hidden">
                <div class="modal-content" style="max-width: 400px; text-align: center;">
                    <h2 id="confirm-title" style="color: #fff;">Confirmation</h2>
                    <p id="confirm-message" style="color: #ccc; margin-bottom: 20px;">Are you sure?</p>
                    <div style="display: flex; justify-content: center; gap: 15px;">
                        <button id="confirm-cancel-btn" style="background: #555;">Cancel</button>
                        <button id="confirm-ok-btn" style="background: #c92a2a;">OK</button>
                    </div>
                </div>
            </div>

            <p style="color:#666; font-size:12px; margin-top:30px;">
                ※初期データがない場合は、<br>Pythonなどでデータを追加してください。
            </p>
        </div>

        <!-- アクティブ画面（実行中） -->
        <div id="active-screen" class="hidden">
            <h2 id="current-task-name">Current Task</h2>
            <div id="timer">00:00</div>
            <button id="next-btn">次の作業へ完了</button>
        </div>

        <!-- 結果画面 -->
        <div id="result-screen" class="hidden">
            <h1>Routine Complete!</h1>

            <div style="width: 100%; height: 250px; margin-bottom: 20px;">
                <canvas id="resultChart"></canvas>
            </div>

            <div id="result-list">
                <!-- 結果詳細 -->
            </div>
            <button onclick="location.reload()">ホームに戻る</button>
        </div>
    </div>
    <script src="/static/app.js?v=6"></script>
</body>

</html>
